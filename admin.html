<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin / Tienda La Reina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-dark: #4f46e5; 
            --success: #10b981; 
            --danger: #ef4444; 
            --bg-body: #f1f5f9; 
            --sidebar-bg: #1e293b; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-body); font-size: 14px; }
        .sidebar { 
            width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; 
            left: 0; top: 0; padding: 20px; overflow-y: auto;
        }
        .main-content { margin-left: 280px; padding: 30px; min-height: 100vh; }
        .mobile-menu-btn { display: none; }
        @media (max-width: 768px) { 
            .mobile-menu-btn { display: block; position: fixed; top: 20px; left: 20px; z-index: 1100; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 10px; } 
            .sidebar { transform: translateX(-100%); } 
            .sidebar.active { transform: translateX(0); } 
            .main-content { margin-left: 0; padding: 80px 20px 30px; } 
        }
        .sidebar-brand { color: white; font-size: 1.3rem; font-weight: 700; margin-bottom: 30px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; color: #94a3b8; cursor: pointer; margin-bottom: 6px; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .tienda-selector { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 16px; margin-bottom: 20px; }
        .tienda-selector select { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 10px; padding: 10px; width: 100%; }
        .tienda-selector select option { background: var(--sidebar-bg); }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .btn-primary { background: var(--primary); border: none; }
        .btn-primary:hover { background: var(--primary-dark); }
        #loginScreen { 
            position: fixed; inset: 0; background: linear-gradient(135deg, #667eea, #764ba2); 
            z-index: 2000; display: flex; align-items: center; justify-content: center; 
        }
        .login-card { background: white; padding: 40px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; }
        .table th { background: #f8fafc; padding: 12px; }
        .table td { padding: 10px; vertical-align: middle; }
        .admin-toast {
            position: fixed; top: 20px; right: 20px; background: white; padding: 12px 20px;
            border-radius: 12px; border-left: 4px solid var(--success); z-index: 9999;
            transform: translateX(120%); transition: transform 0.3s;
        }
        .admin-toast.show { transform: translateX(0); }
        .order-card { border-left: 4px solid var(--primary); margin-bottom: 20px; }
        .badge-status { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
        .codigo-cliente-badge { background: #f0f9ff; border: 2px dashed #6366f1; padding: 4px 12px; border-radius: 8px; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

<button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i> Menú</button>

<div id="loginScreen">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 48px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Tienda La Reina</h2>
        <p class="text-muted mb-4">Panel Administrativo</p>
        <form onsubmit="login(event)">
            <input type="password" id="passInput" class="form-control mb-3" placeholder="Contraseña" required style="padding: 12px;">
            <button class="btn btn-primary w-100" style="padding: 12px;">Ingresar</button>
        </form>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">Tienda La Reina</div>
    <div class="tienda-selector">
        <label class="text-white-50 mb-2">Tienda Activa</label>
        <select id="tiendaSelect" class="form-select"></select>
    </div>
    <div class="nav-item active" data-section="products" onclick="showSection('products')"><i class="fas fa-box"></i> Productos</div>
    <div class="nav-item" data-section="orders" onclick="showSection('orders')"><i class="fas fa-shopping-cart"></i> Pedidos</div>
    <div class="nav-item" data-section="stores" onclick="showSection('stores')"><i class="fas fa-store-alt"></i> Tiendas</div>
    <div class="nav-item" data-section="settings" onclick="showSection('settings')"><i class="fas fa-cog"></i> Configuración</div>
    <div style="flex:1;"></div>
    <div class="nav-item text-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</div>
</div>

<div class="main-content" id="app" style="display:none;">
    <!-- Vista Productos -->
    <div id="view-products">
        <div class="d-flex justify-content-between mb-4">
            <h3><i class="fas fa-box me-2" style="color:var(--primary);"></i> Productos - <span id="currentStoreName"></span></h3>
            <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Nuevo Producto</button>
        </div>
        <div class="card">
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Imagen</th><th>Nombre</th><th>Precio</th><th>Descuento</th><th>Categoría</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="productsList"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Vista Pedidos -->
    <div id="view-orders" style="display:none;">
        <h3 class="mb-4"><i class="fas fa-shopping-cart me-2" style="color:var(--primary);"></i> Pedidos - <span id="currentStoreNameOrders"></span></h3>
        <div id="ordersList"></div>
    </div>
    
    <!-- Vista Tiendas -->
    <div id="view-stores" style="display:none;">
        <h3 class="mb-4">Gestión de Tiendas</h3>
        <div class="card">
            <form id="storeForm" onsubmit="saveStore(event)">
                <input type="hidden" id="storeId">
                <div class="row">
                    <div class="col-md-4 mb-3"><label>ID (slug)</label><input type="text" id="storeSlug" class="form-control" required placeholder="ej. electro"></div>
                    <div class="col-md-4 mb-3"><label>Nombre</label><input type="text" id="storeDisplayName" class="form-control" required></div>
                    <div class="col-md-4 mb-3"><label>Icono</label><input type="text" id="storeIcon" class="form-control" value="🛒"></div>
                    <div class="col-12 mb-3"><label>Descripción</label><textarea id="storeDescription" class="form-control" rows="2"></textarea></div>
                    <div class="col-12 mb-3"><label>Categorías (separadas por coma)</label><input type="text" id="storeCategories" class="form-control" value="otros"></div>
                    <div class="col-12"><button type="submit" class="btn btn-primary">Guardar Tienda</button>
                    <button type="button" class="btn btn-secondary ms-2" onclick="resetStoreForm()">Cancelar</button></div>
                </div>
            </form>
        </div>
        <div class="card">
            <h5>Tiendas Registradas</h5>
            <div class="table-responsive">
                <table class="table"><thead><tr><th>ID</th><th>Icono</th><th>Nombre</th><th>Acciones</th></tr></thead><tbody id="storesList"></tbody></table>
            </div>
        </div>
    </div>
    
    <!-- Vista Configuración -->
    <div id="view-settings" style="display:none;">
        <h3 class="mb-4">Configuración Global</h3>
        <div class="card" style="max-width:500px;">
            <form onsubmit="saveCurrencyConfig(event)">
                <div class="mb-3"><label>1 USD a CUP</label><input type="number" step="0.01" id="rateUSD" class="form-control" required></div>
                <div class="mb-3"><label>1 EUR a CUP</label><input type="number" step="0.01" id="rateEUR" class="form-control" required></div>
                <button class="btn btn-primary w-100">Guardar Configuración</button>
            </form>
        </div>
    </div>
</div>

<!-- Modal Producto -->
<div class="modal fade" id="productModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5>Producto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="productFormData">
                    <input type="hidden" id="productId">
                    <div class="mb-3"><label>Nombre</label><input type="text" id="prodName" class="form-control" required></div>
                    <div class="mb-3"><label>Descripción</label><textarea id="prodDescription" class="form-control" rows="2"></textarea></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Precio (CUP)</label><input type="number" id="prodPrice" class="form-control" required></div>
                        <div class="col-md-6 mb-3"><label>Descuento %</label><input type="number" id="prodDiscount" class="form-control" value="0"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Categoría</label><select id="prodCategory" class="form-select"></select>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="quickAddCategory()"><i class="fas fa-plus"></i> Nueva Categoría</button></div>
                        <div class="col-md-6 mb-3"><label>Tamaño</label><select id="prodSize" class="form-select"><option value="pequeno">Pequeño</option><option value="grande">Grande</option></select></div>
                    </div>
                    <div class="mb-3"><label>Estado</label><select id="prodStock" class="form-select"><option value="true">Disponible</option><option value="false">Agotado</option></select></div>
                    <div class="mb-3"><label>URL Imagen</label><input type="text" id="prodImage" class="form-control"></div>
                    <div class="mb-3"><label>Subir archivo</label><input type="file" id="prodFile" class="form-control" accept="image/*"></div>
                </form>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" onclick="saveProduct()">Guardar</button></div>
        </div>
    </div>
</div>

<div class="admin-toast" id="adminToast"><i class="fas fa-bell"></i> <span id="adminToastMsg"></span></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let ADMIN_PASS = "";
    let productModal, tiendasDisponibles = [];
    let categoriasActuales = [];
    let lastOrderCount = 0;
    let orderCheckInterval;
    
    function showToast(msg, type = 'success') {
        const toast = document.getElementById('adminToast');
        toast.style.borderLeftColor = type === 'success' ? '#10b981' : '#ef4444';
        document.getElementById('adminToastMsg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    async function authFetch(url, options = {}) {
        const separator = url.includes('?') ? '&' : '?';
        const authUrl = `${url}${separator}password=${ADMIN_PASS}`;
        const res = await fetch(authUrl, options);
        if (res.status === 401) { logout(); throw new Error('Sesión expirada'); }
        return res;
    }
    
    async function loadTiendaSelector() {
        try {
            const res = await authFetch('/api/admin/tiendas');
            const tiendas = await res.json();
            tiendasDisponibles = tiendas;
            const select = document.getElementById('tiendaSelect');
            select.innerHTML = '<option value="">Seleccionar tienda...</option>';
            tiendas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = `${t.icono || '🛒'} ${t.nombre}`;
                select.appendChild(opt);
            });
            if (tiendas.length > 0) select.value = tiendas[0].id;
            updateStoreName();
            return tiendas;
        } catch(e) { console.error(e); return []; }
    }
    
    function updateStoreName() {
        const select = document.getElementById('tiendaSelect');
        const selected = select.options[select.selectedIndex]?.text || 'Tienda';
        document.getElementById('currentStoreName').innerText = selected;
        document.getElementById('currentStoreNameOrders').innerText = selected;
    }
    
    async function login(e) {
        e.preventDefault();
        const password = document.getElementById('passInput').value;
        try {
            const res = await fetch('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) {
                ADMIN_PASS = password;
                localStorage.setItem('adminAuth', 'true');
                localStorage.setItem('adminPass', password);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                await loadTiendaSelector();
                await loadCategorias();
                await loadProducts();
                loadStores();
                startOrderPolling();
            } else { alert('Contraseña incorrecta'); }
        } catch(e) { alert('Error de conexión'); }
    }
    
    function logout() {
        localStorage.removeItem('adminAuth');
        localStorage.removeItem('adminPass');
        ADMIN_PASS = "";
        if (orderCheckInterval) clearInterval(orderCheckInterval);
        location.reload();
    }
    
    async function checkAuth() {
        const storedAuth = localStorage.getItem('adminAuth');
        const storedPass = localStorage.getItem('adminPass');
        if (storedAuth === 'true' && storedPass) {
            ADMIN_PASS = storedPass;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            await loadTiendaSelector();
            await loadCategorias();
            await loadProducts();
            loadStores();
            startOrderPolling();
        }
    }
    
    function showSection(s) {
        document.querySelectorAll('[id^="view-"]').forEach(v => v.style.display = 'none');
        document.getElementById(`view-${s}`).style.display = 'block';
        if (s === 'products') loadProducts();
        if (s === 'orders') loadOrders();
        if (s === 'stores') loadStores();
        if (s === 'settings') loadCurrencyConfig();
        if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('active');
    }
    
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    document.getElementById('tiendaSelect').addEventListener('change', () => {
        updateStoreName();
        loadCategorias();
        loadProducts();
        loadOrders();
    });
    
    // ========== TIENDAS ==========
    function resetStoreForm() {
        document.getElementById('storeForm').reset();
        document.getElementById('storeId').value = '';
    }
    
    async function loadStores() {
        try {
            const res = await authFetch('/api/admin/tiendas');
            const stores = await res.json();
            const tbody = document.getElementById('storesList');
            if (!stores.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-center">No hay tiendas</td></tr>'; return; }
            tbody.innerHTML = stores.map(s => `
                <tr><td><code>${s.id}</code></td><td style="font-size:1.3rem;">${s.icono || '🛒'}</td>
                <td><strong>${s.nombre}</strong></td>
                <td><button class="btn btn-sm btn-outline-primary" onclick="editStore('${s.id}')"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteStore('${s.id}')"><i class="fas fa-trash"></i></button></td></tr>
            `).join('');
        } catch(e) { console.error(e); }
    }
    
    async function editStore(slug) {
        try {
            const res = await authFetch(`/api/admin/tiendas/${slug}`);
            const store = await res.json();
            document.getElementById('storeId').value = store.id;
            document.getElementById('storeSlug').value = store.id;
            document.getElementById('storeDisplayName').value = store.nombre;
            document.getElementById('storeIcon').value = store.icono || '🛒';
            document.getElementById('storeDescription').value = store.descripcion || '';
            document.getElementById('storeCategories').value = (store.categorias || []).join(', ');
        } catch(e) { showToast('Error cargando tienda', 'error'); }
    }
    
    async function saveStore(e) {
        e.preventDefault();
        const id = document.getElementById('storeId').value;
        const slug = document.getElementById('storeSlug').value.trim().toLowerCase();
        const nombre = document.getElementById('storeDisplayName').value.trim();
        const icono = document.getElementById('storeIcon').value.trim() || '🛒';
        const descripcion = document.getElementById('storeDescription').value.trim();
        const categorias = document.getElementById('storeCategories').value.split(',').map(c => c.trim()).filter(c => c);
        if (!slug || !nombre) { alert('Completa ID y Nombre'); return; }
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/admin/tiendas/${id}` : `/api/admin/tiendas`;
        try {
            const res = await authFetch(url, {
                method, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: slug, nombre, icono, descripcion, categorias, configuracion: {} })
            });
            if (res.ok) {
                resetStoreForm();
                await loadTiendaSelector();
                loadStores();
                showToast(id ? 'Tienda actualizada' : 'Tienda creada');
            } else { const err = await res.json(); showToast(err.error || 'Error al guardar', 'error'); }
        } catch(e) { showToast('Error de conexión', 'error'); }
    }
    
    async function deleteStore(slug) {
        if (!confirm(`¿Eliminar tienda "${slug}"?`)) return;
        try {
            await authFetch(`/api/admin/tiendas/${slug}`, { method: 'DELETE' });
            await loadTiendaSelector();
            loadStores();
            showToast('Tienda eliminada');
        } catch(e) { showToast('Error al eliminar', 'error'); }
    }
    
    // ========== CATEGORÍAS ==========
    async function loadCategorias() {
        const t = document.getElementById('tiendaSelect').value;
        if (!t) return;
        try {
            const res = await authFetch(`/api/admin/categorias&tienda=${t}`);
            categoriasActuales = await res.json();
            const select = document.getElementById('prodCategory');
            select.innerHTML = categoriasActuales.map(c => `<option value="${c}">${c}</option>`).join('');
        } catch(e) { console.error(e); }
    }
    
    async function quickAddCategory() {
        const n = prompt('Nueva categoría:');
        if (n) {
            const t = document.getElementById('tiendaSelect').value;
            try {
                await authFetch('/api/admin/categorias', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tienda: t, categoria: n.toLowerCase() })
                });
                await loadCategorias();
                showToast(`Categoría "${n}" agregada`);
            } catch(e) { showToast('Error al agregar', 'error'); }
        }
    }
    
    // ========== PRODUCTOS ==========
    async function loadProducts() {
        const t = document.getElementById('tiendaSelect').value;
        if (!t) { console.log('No hay tienda seleccionada'); return; }
        try {
            const res = await authFetch(`/api/admin/productos?tienda=${t}`);
            const products = await res.json();
            const tbody = document.getElementById('productsList');
            if (!products.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center">No hay productos</td></tr>'; return; }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.imagen}" style="width:45px;height:45px;object-fit:cover;border-radius:8px;" onerror="this.src='https://via.placeholder.com/45'"></td>
                    <td class="fw-semibold">${p.nombre}</td>
                    <td>$${p.precio}</td>
                    <td>${p.descuento || 0}%</td>
                    <td><span class="badge bg-light text-dark">${p.categoria || 'otros'}</span></td>
                    <td>${p.disponible ? '<span class="badge bg-success">Disponible</span>' : '<span class="badge bg-danger">Agotado</span>'}</td>
                    <td><button class="btn btn-sm btn-outline-primary me-1" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        } catch(e) { console.error('Error loading products:', e); showToast('Error cargando productos', 'error'); }
    }
    
    function openProductModal() {
        document.getElementById('productFormData').reset();
        document.getElementById('productId').value = '';
        productModal = new bootstrap.Modal(document.getElementById('productModal'));
        productModal.show();
    }
    
    async function editProduct(id) {
        const t = document.getElementById('tiendaSelect').value;
        try {
            const res = await authFetch(`/api/admin/productos?tienda=${t}`);
            const products = await res.json();
            const p = products.find(x => x.id == id);
            if (p) {
                document.getElementById('productId').value = p.id;
                document.getElementById('prodName').value = p.nombre;
                document.getElementById('prodDescription').value = p.descripcion || '';
                document.getElementById('prodPrice').value = p.precio;
                document.getElementById('prodDiscount').value = p.descuento || 0;
                document.getElementById('prodSize').value = p.tamanio || 'pequeno';
                document.getElementById('prodStock').value = p.disponible.toString();
                document.getElementById('prodImage').value = p.imagen || '';
                document.getElementById('prodCategory').value = p.categoria || 'otros';
                productModal = new bootstrap.Modal(document.getElementById('productModal'));
                productModal.show();
            }
        } catch(e) { showToast('Error cargando producto', 'error'); }
    }
    
    async function saveProduct() {
        const id = document.getElementById('productId').value;
        const t = document.getElementById('tiendaSelect').value;
        if (!t) { showToast('Selecciona una tienda', 'error'); return; }
        
        const f = new FormData();
        f.append('tienda', t);
        f.append('nombre', document.getElementById('prodName').value);
        f.append('descripcion', document.getElementById('prodDescription').value);
        f.append('precio', document.getElementById('prodPrice').value);
        f.append('descuento', document.getElementById('prodDiscount').value || 0);
        f.append('tamanio', document.getElementById('prodSize').value);
        f.append('categoria', document.getElementById('prodCategory').value);
        f.append('disponible', document.getElementById('prodStock').value);
        f.append('imagen_url', document.getElementById('prodImage').value);
        const file = document.getElementById('prodFile').files[0];
        if (file) f.append('imagen', file);
        
        const url = id ? `/api/admin/productos/${id}` : `/api/admin/productos`;
        try {
            const res = await authFetch(url, { method: id ? 'PUT' : 'POST', body: f });
            const result = await res.json();
            if (res.ok && result.success) {
                productModal.hide();
                await loadProducts();
                showToast(id ? 'Producto actualizado' : 'Producto creado');
            } else { showToast(result.error || 'Error al guardar', 'error'); }
        } catch(e) { showToast('Error de conexión', 'error'); }
    }
    
    async function deleteProduct(id) {
        if (!confirm('¿Eliminar producto?')) return;
        const t = document.getElementById('tiendaSelect').value;
        try {
            await authFetch(`/api/admin/productos/${id}?tienda=${t}`, { method: 'DELETE' });
            await loadProducts();
            showToast('Producto eliminado');
        } catch(e) { showToast('Error al eliminar', 'error'); }
    }
    
    // ========== PEDIDOS ==========
    async function loadOrders() {
        const t = document.getElementById('tiendaSelect').value;
        if (!t) return;
        try {
            const res = await authFetch(`/api/admin/pedidos?tienda=${t}`);
            const orders = await res.json();
            const container = document.getElementById('ordersList');
            if (!orders.length) { container.innerHTML = '<div class="alert alert-info">No hay pedidos registrados</div>'; return; }
            container.innerHTML = orders.map(p => {
                const tiendaInfo = tiendasDisponibles.find(ti => ti.id === p.tienda);
                const telefonoTienda = tiendaInfo?.configuracion?.contacto?.telefono || '+53 5XXXXXXX';
                return `
                <div class="card order-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <div><h5>Pedido #${p.id}</h5><small>${new Date(p.created_at).toLocaleString()}</small></div>
                            <div class="d-flex align-items-center gap-2">
                                ${p.codigo_cliente ? `<span class="codigo-cliente-badge"><i class="fas fa-qrcode"></i> ${p.codigo_cliente}</span>` : ''}
                                <span class="badge-status bg-${p.estado==='pendiente'?'warning':p.estado==='confirmado'?'info':p.estado==='enviado'?'primary':'success'}">${p.estado}</span>
                            </div>
                        </div>
                        <hr>
                        <div class="row mb-3">
                            <div class="col-md-4"><i class="fas fa-user"></i> ${p.nombre}</div>
                            <div class="col-md-4"><i class="fas fa-phone"></i> ${p.telefono}</div>
                            <div class="col-md-4"><i class="fas fa-map-marker-alt"></i> ${p.direccion}</div>
                        </div>
                        <div class="bg-light p-3 rounded mb-3">
                            ${(p.items || []).map(i => `<div class="d-flex justify-content-between"><span>${i.qty}x ${i.nombre}</span><span>$${((i.precio||0)*i.qty).toFixed(2)}</span></div>`).join('')}
                            <hr><div class="d-flex justify-content-between fw-bold"><span>Total</span><span>$${p.total.toFixed(2)}</span></div>
                        </div>
                        <div class="d-flex gap-2">
                            <select class="form-select form-select-sm w-auto" onchange="updateOrderStatus(${p.id}, this.value)">
                                <option value="pendiente" ${p.estado==='pendiente'?'selected':''}>Pendiente</option>
                                <option value="confirmado" ${p.estado==='confirmado'?'selected':''}>Confirmado</option>
                                <option value="enviado" ${p.estado==='enviado'?'selected':''}>Enviado</option>
                                <option value="entregado" ${p.estado==='entregado'?'selected':''}>Entregado</option>
                            </select>
                            <button class="btn btn-whatsapp btn-sm" onclick="notificarWhatsApp('${telefonoTienda}', '${p.nombre}', ${p.id}, '${p.codigo_cliente || ''}')"><i class="fab fa-whatsapp"></i> Notificar</button>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteSingleOrder(${p.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        } catch(e) { console.error(e); }
    }
    
    function notificarWhatsApp(telefono, nombre, orderId, codigoCliente) {
        let msg = `Hola ${nombre}, su pedido #${orderId} ha sido procesado.`;
        if (codigoCliente) msg += ` Su código es: ${codigoCliente}.`;
        window.open(`https://wa.me/${telefono.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
    }
    
    async function updateOrderStatus(id, estado) {
        const t = document.getElementById('tiendaSelect').value;
        try {
            await authFetch(`/api/admin/pedidos/${id}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tienda: t, estado })
            });
            await loadOrders();
            showToast('Estado actualizado');
        } catch(e) { showToast('Error', 'error'); }
    }
    
    async function deleteSingleOrder(id) {
        if (!confirm('¿Eliminar este pedido?')) return;
        const t = document.getElementById('tiendaSelect').value;
        try {
            await authFetch(`/api/admin/pedidos/${id}?tienda=${t}`, { method: 'DELETE' });
            await loadOrders();
            showToast('Pedido eliminado');
        } catch(e) { showToast('Error', 'error'); }
    }
    
    async function deleteAllOrders() {
        if (!confirm('¿Eliminar TODOS los pedidos?')) return;
        const t = document.getElementById('tiendaSelect').value;
        try {
            await authFetch(`/api/admin/pedidos?tienda=${t}`, { method: 'DELETE' });
            await loadOrders();
            showToast('Todos los pedidos eliminados');
        } catch(e) { showToast('Error', 'error'); }
    }
    
    function startOrderPolling() {
        checkForNewOrders();
        orderCheckInterval = setInterval(checkForNewOrders, 10000);
    }
    
    async function checkForNewOrders() {
        if (!ADMIN_PASS) return;
        const activeSection = document.querySelector('.nav-item.active')?.dataset.section;
        if (activeSection === 'orders') return;
        const t = document.getElementById('tiendaSelect')?.value;
        if (!t) return;
        try {
            const res = await authFetch(`/api/admin/pedidos?tienda=${t}`);
            const orders = await res.json();
            if (orders.length > lastOrderCount && lastOrderCount > 0) {
                document.getElementById('newOrderIndicator').classList.add('active');
                showToast(`🔔 ${orders.length - lastOrderCount} nuevo(s) pedido(s)`, 'success');
            }
            lastOrderCount = orders.length;
        } catch(e) { console.error(e); }
    }
    
    // ========== CONFIGURACIÓN ==========
    async function loadCurrencyConfig() {
        try {
            const res = await authFetch('/api/admin/config');
            const c = await res.json();
            document.getElementById('rateUSD').value = (1 / c.tasas?.USD).toFixed(2);
            document.getElementById('rateEUR').value = (1 / c.tasas?.EUR).toFixed(2);
        } catch(e) { console.error(e); }
    }
    
    async function saveCurrencyConfig(e) {
        e.preventDefault();
        const u = parseFloat(document.getElementById('rateUSD').value);
        const eu = parseFloat(document.getElementById('rateEUR').value);
        try {
            await authFetch('/api/admin/config', {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ monedaBase: 'CUP', tasas: { CUP: 1, USD: 1 / u, EUR: 1 / eu } })
            });
            showToast('Configuración guardada');
        } catch(e) { showToast('Error', 'error'); }
    }
    
    checkAuth();
</script>
</body>
</html>
